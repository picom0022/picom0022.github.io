<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form</title>
</head>
<body>
	<!-- 
	Form : 사용자들에게 정보를 입력 받아 서버에게 정보를 전달하는 역할을 함
	<form [action=""] [method=""] [enctype=""]>
	form elements(요소들)
	</form>
	
	1. action = "정보가 전달되는 페이지 경로(서버경로)"
	2. method = "정보를 전달하는 방식"
		-get(생략) : 정보를 head에 담아서 보낸다.
					적은용량, 주소창에 보인다. 보안이 취약 ex)검색
		-post	: 정보를 body에 담아서 보낸다.
					대용량 가능, 주소창에 안보이, get보다 느림
	3. enctype	=> 평소에는 사용할 일 없음, 업로드 할 때만 사용
	
	4. form elements 태그들 : input, label, select, textarea, fiedset, legend
	
	5. input 태그의 type 속성값들 : text, button, radio, checkbox, file, hidden
							  number, password, reset, submit,
							  tel, color, date, email, time, url, week,
							  range, search	...etc
							  
		input type 속성 중 name 속성은 데이터 전달 할 때 사용되는 name.
		input type 속성 중 value 속성은 데이터 전달 할 때 사용되는 value 
		** 데이터가 전달 될 때   ~~~~?name=value&name=vaule&name=value
		
		** checkbox, select 경우 같은 이름이 여러 개 지정될 경우가 있다. 이 경우 서버에서는 배열로 받는다.
		** radio, checkbox: checked 라는 속성은 선택되었다는 뜻
		** select : selected 속성을 지정하면 선택 되엇다는 뜻
				   option 태그와 함께 사용
				   size는 화면에 표시되는 갯수
				   multiple 속성은 ctrl 키를 이용하면 동시에 여러 개 선택 가능
		
		** reset 속성은 form 태그 안에 입력한 정보를 초기화 한다.(버튼 형태)
		** submit 속성은 form 태그 정보를 action 이 지정한 페이지로 정보를 전달한다.(버튼 형태)
		
		** input type="text"
		   disabled : 커서가 들어가지 않아서 입력할 수 없다.
		   readonly : 오직 읽기만 가능, 수정 안됨
		   placehoder : 힌트 표시
		   required : 반드시 입력되어야 되는 태그에 붙이는 속성
		   pattern	: [0-9(숫자만)]{3(자릿수)}
		   			  [A-Z a-z]
		   			  [0-9]{3}-[0-9]{4}-[0-9]{4} : 전화번호
		   javascript 전까지는 submit 속성을 이용해서 서버에 정보를 전달
		   javascript 에서는 input type=button 속성에 onclick을 이용해서
		   javascript 함수 호출해서 전달 한다.
 -->
	<form action="Ex01_Form.html" method="get">
		<p>
			아이디 :
			<!-- input type="text" => 한줄 입력, 입력한 정보가 value 가 된다. -->
			<input type="text" name="id" maxlength="10" placeholder="아이디를 입력하세요."
				value="a1111" required>
		</p>

		<p>
			<label>패스워드 : </label> <input type="password" name="pw"
				maxlength="10" placeholder="패스워드를 입력하세요." value="a1111" readonly>
		</p>
		<!-- label for와 input의 id가 같으면 연결 -->
		<p>
			<label for="username">이름 : </label> <input type="text" id="username"
				name="username" maxlength="10" placeholder="이름을 입력하세요."
				value="a1111" disabled>
		</p>

		<p>
			<label for="userage">나이 : </label> <input type="number" id="userage"
				name="age" maxlength="3">
		</p>

		<p>
			<label for="birth">생년월일 : </label> <input type="text" id="birth"
				name="birth" pattern="[0-9]{6}">
		</p>

		<p>
			<input type="radio" name="gender" value="1" checked> 남자 <input
				type="radio" name="gender" value="2"> 여자
		</p>

		<p>
			취미: <input type="checkbox" name="hobby" value="1"> 운동 <input
				type="checkbox" name="hobby" value="2"> 게임 <input
				type="checkbox" name="hobby" value="3"> 영화 <input
				type="checkbox" name="hobby" value="4"> 독서
		</p>
		<p>
			주소 : <select name="addr">
				<option>::선택하세요::</option>
				<option value="1">서울</option>
				<option value="2">경기</option>
				<option value="3">제주</option>
				<option value="4">해외</option>
			</select>
		</p>

		<p>
			웹 브라우저 : <select name="browser" multiple size="5">
				<option value="1">크롬</option>
				<option value="2">사파리</option>
				<option value="3">파이어폭스</option>
				<option value="4">엣지</option>
				<option value="5">오페라</option>
			</select>
		</p>

		<!-- input type = "file" 경우 form 속성 enctype="" 사용해야 한다. -->
		<p>
			파일 : <input type="file" name="file">
		</p>
		<p>
			날짜 : <input type="date" name="regdate">
		</p>
		
		<p>
			시간 : <input type="time" name="time">
		</p>
		<p>
			컬러 : <input type="color" name="color">
		</p>
		<p>
			범위 : <input type="range" name="range">
		</p>
		
		<p> 
			자기소개서 : <br><textarea rows="5" cols = "50" name="self" style="resize: none"></textarea>
		</p>
		
		
		
		
		<p>
			<input type="reset" value="취소">
		</p>
		<p>
			<input type="submit" value="보내기">
		</p>

	</form>
</body>
</html>
